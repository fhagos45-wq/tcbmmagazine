<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Access | TCB News</title>
    <link rel="stylesheet" href="acount.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay">
        <div class="auth-card">
            <div class="form-header">
                <h2 id="form-title">Welcome Back</h2>
                <p id="form-subtitle">Please enter your details to continue</p>
            </div>

            <div class="tab-container">
                <button id="login-tab" class="active" onclick="toggleMode('login')">Login</button>
                <button id="signup-tab" onclick="toggleMode('signup')">Create Account</button>
            </div>

            <form id="auth-form">
                <div id="name-group" class="input-group hidden">
                    <input type="text" id="full-name" placeholder="Full Name">
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">Access Magazine</button>
            </form>
            
            <div id="api-status" class="status-msg"></div>
        </div>
    </div>
    <script src="acount.js"></script>
</body>
</html>
