<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <!-- Login Form -->
            <form id="login-form" class="form-content">
                <h2>Login</h2>
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Log In</button>
                <p>Don't have an account? <span class="toggle-link" onclick="toggleForm()">Sign Up</span></p>
            </form>

            <!-- Sign Up Form (Hidden by default) -->
            <form id="signup-form" class="form-content hidden">
                <h2>Create Account</h2>
                <input type="text" id="signup-name" placeholder="Full Name" required>
                <input type="email" id="signup-email" placeholder="Email" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
                <p>Already have an account? <span class="toggle-link" onclick="toggleForm()">Log In</span></p>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
